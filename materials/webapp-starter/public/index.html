<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Workshop Starter</title>
    <style>
      :root {
        --bg: #f3f7f4;
        --panel: #ffffff;
        --primary: #0f766e;
        --primary-2: #115e59;
        --text: #102a2e;
        --muted: #4b6b70;
        --border: #cfe3de;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 20%, #e9f7f3 0%, transparent 35%),
          radial-gradient(circle at 90% 0%, #dff0ec 0%, transparent 30%),
          var(--bg);
      }

      .wrap {
        max-width: 900px;
        margin: 32px auto;
        padding: 20px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(16, 42, 46, 0.08);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 12px;
      }

      p {
        color: var(--muted);
      }

      textarea {
        width: 100%;
        min-height: 120px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        font-size: 1rem;
        margin: 10px 0 14px;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
        margin: 10px 0 14px;
      }

      .mode-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 8px 0;
      }

      .mode-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.9rem;
        color: var(--text);
        background: #eef7f5;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 10px;
      }

      .hint {
        margin-top: -6px;
        margin-bottom: 12px;
        font-size: 0.86rem;
        color: var(--muted);
      }

      button {
        border: none;
        background: linear-gradient(120deg, var(--primary), var(--primary-2));
        color: white;
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        transform: translateY(-1px);
      }

      pre {
        margin-top: 16px;
        background: #f7fbfa;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        white-space: pre-wrap;
      }

      @media (max-width: 640px) {
        .wrap {
          margin: 12px auto;
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>AI Web Integration Lab Starter</h1>
        <p>
          Use either manual text or your Lab C content file. The API returns structured
          JSON so you can render and optimize a real landing hero flow.
        </p>

        <div class="mode-row" role="radiogroup" aria-label="Input mode">
          <label class="mode-chip"><input type="radio" name="mode" value="artifact" checked> Use Lab C artifact</label>
          <label class="mode-chip"><input type="radio" name="mode" value="manual"> Manual input</label>
        </div>

        <label for="contentPath">Lab C content path</label>
        <input id="contentPath" type="text" value="deliverables/TEAM_ALPHA/content-pack-v2.md" />
        <p class="hint">Example: deliverables/TEAM_ALPHA/content-pack-v2.md</p>

        <label for="input">Input</label>
        <textarea id="input" placeholder="Describe your task or business context..." style="display:none"></textarea>
        <button id="runBtn">Generate</button>

        <pre id="output">Result will appear here...</pre>
      </div>
    </div>

    <script>
      const inputEl = document.getElementById('input');
      const contentPathEl = document.getElementById('contentPath');
      const runBtn = document.getElementById('runBtn');
      const outputEl = document.getElementById('output');
      const modeEls = Array.from(document.querySelectorAll('input[name="mode"]'));

      function selectedMode() {
        const active = modeEls.find((el) => el.checked);
        return active ? active.value : 'artifact';
      }

      function syncModeUI() {
        const artifactMode = selectedMode() === 'artifact';
        contentPathEl.style.display = artifactMode ? '' : 'none';
        contentPathEl.previousElementSibling.style.display = artifactMode ? '' : 'none';
        contentPathEl.nextElementSibling.style.display = artifactMode ? '' : 'none';
        inputEl.style.display = artifactMode ? 'none' : '';
      }

      async function runGenerate() {
        outputEl.textContent = 'Loading...';

        try {
          const mode = selectedMode();
          const payload = mode === 'artifact'
            ? { contentPath: contentPathEl.value }
            : { input: inputEl.value };

          const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          outputEl.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          outputEl.textContent = `Request failed: ${error.message}`;
        }
      }

      runBtn.addEventListener('click', runGenerate);
      modeEls.forEach((el) => el.addEventListener('change', syncModeUI));
      syncModeUI();
    </script>
  </body>
</html>
